services:
  waha:
    image: devlikeapro/waha
    container_name: mukalma-waha
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # GOWS: WebSocket-based (Golang), no headless Chromium — dramatically
      # lighter per session than WEBJS. Needed so one server can host many
      # tenants' WhatsApp sessions concurrently. Webhook payload shape can
      # differ from WEBJS — httpActions.ts logs the raw payload if parsing
      # doesn't match, so check Convex logs after reconnecting a session.
      WHATSAPP_DEFAULT_ENGINE: GOWS
      WAHA_DASHBOARD_ENABLED: "true"
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-admin}
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
    volumes:
      - waha_sessions:/app/.sessions

volumes:
  waha_sessions:
